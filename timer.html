<!doctype html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>טיימר - מיקרו כלכלה</title>
  <link rel="stylesheet" href="styles.css" />
  <link rel="manifest" href="manifest.json" />
</head>
<body data-mode="timer">
  <script>
    (function(){
      var t = localStorage.getItem('micro-study-theme');
      if (!t) t = (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) ? 'dark' : 'light';
      document.body.setAttribute('data-theme', t);
    })();
  </script>
  <main class="container" id="main-content">
    <nav class="breadcrumb" aria-label="ניווט">
      <a href="index.html">דף ראשי</a>
      <span class="bc-sep">›</span>
      <a href="game-modes.html">מצבי משחק</a>
      <span class="bc-sep">›</span>
      <span>טיימר</span>
    </nav>
    <header class="card">
      <div class="header-row">
        <h1>⏱️ תרגול עם טיימר</h1>
        <div class="actions compact">
          <a class="btn" href="game-modes.html">חזרה למצבי משחק</a>
          <a class="btn" href="index.html">חזרה לדף ראשי</a>
          <button id="theme-toggle" class="btn" type="button" aria-label="החלפת מצב תצוגה">🌙 מצב כהה</button>
        </div>
      </div>
      <p id="load-status" class="status">מצב נוכחי: טיימר</p>
    </header>

    <section class="card" id="setup-section">
      <h2>הגדרות תרגול</h2>

      <!-- Timer type toggle -->
      <div class="field">
        <p class="label">סוג טיימר</p>
        <div class="question-filter-row">
          <label class="question-filter-option">
            <input type="radio" name="timer-type" value="total" checked />
            <span>⏱️ טיימר לכל הסבב <span class="filter-hint">(הזמן רץ עד סוף המשחק)</span></span>
          </label>
          <label class="question-filter-option">
            <input type="radio" name="timer-type" value="per-question" />
            <span>⏱️ טיימר לשאלה <span class="filter-hint">(כל שאלה מוגבלת בזמן משלה)</span></span>
          </label>
        </div>
      </div>

      <!-- Total timer settings (shown by default) -->
      <div id="timer-total-settings" class="field">
        <p class="label">זמן כולל לסבב</p>
        <div class="time-inputs-row">
          <label class="time-input-label">
            <span class="time-input-unit">דקות</span>
            <input id="timer-total-minutes" type="number" min="0" max="180" value="5" class="time-input" />
          </label>
          <span class="time-colon">:</span>
          <label class="time-input-label">
            <span class="time-input-unit">שניות</span>
            <input id="timer-total-seconds" type="number" min="0" max="59" value="0" class="time-input" />
          </label>
        </div>
      </div>

      <!-- Per-question timer settings (hidden by default) -->
      <div id="timer-per-settings" class="field hidden">
        <p class="label">זמן לכל שאלה</p>
        <div class="time-inputs-row">
          <label class="time-input-label">
            <span class="time-input-unit">דקות</span>
            <input id="timer-per-minutes" type="number" min="0" max="10" value="0" class="time-input" />
          </label>
          <span class="time-colon">:</span>
          <label class="time-input-label">
            <span class="time-input-unit">שניות</span>
            <input id="timer-per-seconds" type="number" min="5" max="300" value="30" class="time-input" />
          </label>
        </div>
      </div>

      <!-- Question count -->
      <div class="field">
        <label for="question-count">מספר שאלות לתרגול (השאר ריק = כל השאלות)</label>
        <input id="question-count" type="number" min="1" placeholder="לדוגמה: 20" />
      </div>

      <!-- Lecture filters -->
      <div class="field">
        <p class="label">בחירת שיעורים / מצגות (ברירת מחדל: כל המצגות מסומנות)</p>
        <div id="lecture-filters" class="lecture-grid"></div>
      </div>

      <div class="actions">
        <button id="start-quiz" class="btn primary">התחל תרגול</button>
        <button id="reset-setup" class="btn">איפוס בחירה</button>
      </div>

      <p id="selection-summary" class="muted"></p>
    </section>

    <section class="card hidden" id="quiz-section">
      <div class="quiz-head">
        <h2>תרגול</h2>
        <p id="progress"></p>
      </div>

      <div class="quiz-state-row">
        <p id="mode-status" class="meta"></p>
        <p id="timer-status" class="meta"></p>
        <p id="lives-status" class="meta hidden"></p>
        <p id="streak-status" class="meta hidden"></p>
      </div>

      <div id="question-meta" class="meta"></div>
      <h3 id="question-text" class="question"></h3>

      <form id="answers-form" class="choices"></form>
      <p id="keyboard-hint" class="keyboard-hint">💡 מקשים: 1–4 לבחירה · Enter לאישור</p>

      <div class="actions">
        <button id="submit-answer" class="btn primary" type="button">בדיקת תשובה</button>
        <button id="next-question" class="btn hidden" type="button">לשאלה הבאה</button>
        <button id="finish-quiz" class="btn" type="button">סיום תרגול</button>
      </div>

      <div id="feedback" class="feedback hidden"></div>
    </section>

    <section class="card hidden" id="result-section">
      <h2>סיכום תרגול</h2>
      <p id="result-score"></p>
      <p id="result-details" class="muted"></p>
      <div id="result-wrong-list"></div>
      <div class="actions">
        <button id="restart-quiz" class="btn primary">תרגול נוסף</button>
      </div>
    </section>

  </main>

  <script src="questions-data.js"></script>
  <script src="quiz.js"></script>
  <footer class="app-version-footer"></footer>
  <script src="version.js"></script>
  <script>if ('serviceWorker' in navigator) navigator.serviceWorker.getRegistrations().then(regs => regs.forEach(r => r.unregister()));</script>
</body>
</html>
