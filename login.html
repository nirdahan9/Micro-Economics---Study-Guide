<!doctype html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>כניסה / הרשמה - מיקרו כלכלה</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="container" id="main-content">
    <nav class="breadcrumb" aria-label="ניווט">
      <a href="index.html">דף ראשי</a>
      <span class="bc-sep">›</span>
      <span>כניסה</span>
    </nav>

    <header class="card">
      <div class="header-row">
        <h1>🔐 כניסה למצבי משחק מתקדמים</h1>
        <button id="theme-toggle" class="btn" type="button" aria-label="החלפת מצב תצוגה">🌙 מצב כהה</button>
      </div>
      <p class="status">המצבים חלשים קודם ו-Confidence Mode דורשים חשבון אישי לשמירת ההתקדמות.</p>
    </header>

    <section class="card" id="login-card">
      <div class="auth-tabs">
        <button class="auth-tab active" id="tab-login" type="button">כניסה</button>
        <button class="auth-tab" id="tab-register" type="button">הרשמה</button>
      </div>

      <!-- LOGIN FORM -->
      <form class="auth-form" id="login-form" novalidate>
        <h2>כניסה לחשבון</h2>

        <div class="field">
          <label for="login-username">שם משתמש</label>
          <input id="login-username" type="text" autocomplete="username"
                 placeholder="שם המשתמש שלך" />
        </div>

        <div class="field">
          <label for="login-password">סיסמה</label>
          <div class="password-wrap">
            <input id="login-password" type="password" autocomplete="current-password"
                   placeholder="הסיסמה שלך" />
            <button type="button" class="btn btn-show-pw" id="login-show-pw" aria-label="הצג סיסמה">👁</button>
          </div>
        </div>

        <p class="auth-error hidden" id="login-error" role="alert"></p>

        <div class="actions">
          <button class="btn primary" type="submit" id="login-submit">כניסה</button>
        </div>

        <p class="muted auth-switch-hint">
          אין לך חשבון עדיין?
          <button type="button" class="link-btn" id="goto-register">הרשמה כאן</button>
        </p>
      </form>

      <!-- REGISTER FORM -->
      <form class="auth-form hidden" id="register-form" novalidate>
        <h2>יצירת חשבון חדש</h2>

        <div class="field">
          <label for="reg-username">שם משתמש</label>
          <input id="reg-username" type="text" autocomplete="username"
                 placeholder="בחר שם משתמש (לפחות 2 תווים)" />
        </div>

        <div class="field">
          <label for="reg-password">סיסמה</label>
          <div class="password-wrap">
            <input id="reg-password" type="password" autocomplete="new-password"
                   placeholder="בחר סיסמה (לפחות 4 תווים)" />
            <button type="button" class="btn btn-show-pw" id="reg-show-pw" aria-label="הצג סיסמה">👁</button>
          </div>
        </div>

        <div class="field">
          <label for="reg-password2">אימות סיסמה</label>
          <div class="password-wrap">
            <input id="reg-password2" type="password" autocomplete="new-password"
                   placeholder="הזן את הסיסמה שוב" />
            <button type="button" class="btn btn-show-pw" id="reg-show-pw2" aria-label="הצג סיסמה">👁</button>
          </div>
        </div>

        <p class="auth-error hidden" id="register-error" role="alert"></p>
        <p class="auth-ok hidden" id="register-ok" role="status"></p>

        <div class="actions">
          <button class="btn primary" type="submit" id="register-submit">הרשמה</button>
        </div>

        <p class="muted auth-switch-hint">
          כבר יש לך חשבון?
          <button type="button" class="link-btn" id="goto-login">כניסה כאן</button>
        </p>
      </form>
    </section>
  </main>

  <script src="auth.js"></script>
  <script>
    // ── theme ────────────────────────────────────────────────────────────────
    (function () {
      const THEME_KEY = 'micro-study-theme';
      const btn = document.getElementById('theme-toggle');
      function applyTheme(t) {
        document.body.setAttribute('data-theme', t);
        localStorage.setItem(THEME_KEY, t);
        if (btn) btn.textContent = t === 'dark' ? '☀️ מצב בהיר' : '🌙 מצב כהה';
      }
      const saved = localStorage.getItem(THEME_KEY);
      applyTheme(saved === 'dark' || saved === 'light' ? saved
        : (window.matchMedia?.('(prefers-color-scheme: dark)').matches ? 'dark' : 'light'));
      btn?.addEventListener('click', () => {
        applyTheme(document.body.getAttribute('data-theme') === 'dark' ? 'light' : 'dark');
      });
    })();

    // ── redirect target ──────────────────────────────────────────────────────
    const params  = new URLSearchParams(window.location.search);
    const nextUrl = params.get('next') || 'game-modes.html';

    // If already logged in, skip straight to destination
    if (AUTH.currentUser()) {
      window.location.replace(nextUrl);
    }

    // ── tab switching ────────────────────────────────────────────────────────
    const tabLogin     = document.getElementById('tab-login');
    const tabRegister  = document.getElementById('tab-register');
    const loginForm    = document.getElementById('login-form');
    const registerForm = document.getElementById('register-form');

    function showTab(tab) {
      const isLogin = (tab === 'login');
      loginForm.classList.toggle('hidden', !isLogin);
      registerForm.classList.toggle('hidden', isLogin);
      tabLogin.classList.toggle('active', isLogin);
      tabRegister.classList.toggle('active', !isLogin);
    }

    tabLogin.addEventListener('click',    () => showTab('login'));
    tabRegister.addEventListener('click', () => showTab('register'));
    document.getElementById('goto-register').addEventListener('click', () => showTab('register'));
    document.getElementById('goto-login').addEventListener('click',    () => showTab('login'));

    // ── password visibility toggles ──────────────────────────────────────────
    function togglePw(inputId, btnId) {
      const input = document.getElementById(inputId);
      const btn   = document.getElementById(btnId);
      btn?.addEventListener('click', () => {
        input.type = input.type === 'password' ? 'text' : 'password';
      });
    }
    togglePw('login-password',  'login-show-pw');
    togglePw('reg-password',    'reg-show-pw');
    togglePw('reg-password2',   'reg-show-pw2');

    // ── login ────────────────────────────────────────────────────────────────
    document.getElementById('login-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const errEl  = document.getElementById('login-error');
      const btn    = document.getElementById('login-submit');
      const u = document.getElementById('login-username').value;
      const p = document.getElementById('login-password').value;

      errEl.classList.add('hidden');
      btn.disabled = true;
      btn.textContent = 'מתחבר...';

      const res = await AUTH.login(u, p);
      if (res.ok) {
        window.location.replace(nextUrl);
      } else {
        errEl.textContent = res.error;
        errEl.classList.remove('hidden');
        btn.disabled = false;
        btn.textContent = 'כניסה';
      }
    });

    // ── register ─────────────────────────────────────────────────────────────
    document.getElementById('register-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const errEl  = document.getElementById('register-error');
      const okEl   = document.getElementById('register-ok');
      const btn    = document.getElementById('register-submit');
      const u  = document.getElementById('reg-username').value;
      const p  = document.getElementById('reg-password').value;
      const p2 = document.getElementById('reg-password2').value;

      errEl.classList.add('hidden');
      okEl.classList.add('hidden');

      if (p !== p2) {
        errEl.textContent = 'הסיסמאות אינן תואמות.';
        errEl.classList.remove('hidden');
        return;
      }

      btn.disabled = true;
      btn.textContent = 'רושם...';

      const res = await AUTH.register(u, p);
      if (res.ok) {
        // Auto-login after registration
        await AUTH.login(u, p);
        okEl.textContent = `✅ החשבון נוצר בהצלחה! מעביר אותך...`;
        okEl.classList.remove('hidden');
        setTimeout(() => window.location.replace(nextUrl), 900);
      } else {
        errEl.textContent = res.error;
        errEl.classList.remove('hidden');
        btn.disabled = false;
        btn.textContent = 'הרשמה';
      }
    });
  </script>

  <footer class="app-version-footer"></footer>
  <script src="version.js"></script>
</body>
</html>
