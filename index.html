<!doctype html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>מרכז ניווט - מיקרו כלכלה</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="container">
    <header class="card">
      <div class="header-row">
        <h1>מרכז ניווט - מיקרו כלכלה</h1>
        <button id="theme-toggle" class="btn" type="button" aria-label="החלפת מצב תצוגה">🌙 מצב כהה</button>
      </div>
      <p class="status">בחר לאיזה מסך להיכנס</p>
    </header>

    <section class="card">
      <h2>מסכים זמינים</h2>
      <div class="nav-grid">
        <article class="nav-item">
          <h3>תרגול שאלות</h3>
          <p class="muted">בחירת מספר שאלות, סינון לפי מצגות, וקבלת פידבק מיידי.</p>
          <a class="btn primary" href="quiz.html">כניסה לתרגול</a>
        </article>

        <article class="nav-item">
          <h3>מצגות וסיכום</h3>
          <p class="muted">פתיחה והורדה של כל קבצי ההרצאות והסיכום במקום אחד.</p>
          <a class="btn primary" href="materials.html">כניסה לחומרי לימוד</a>
        </article>

        <article class="nav-item">
          <h3>מצבי משחק נוספים</h3>
          <p class="muted">כאן נוסיף בהמשך מצבי תרגול חדשים.</p>
          <button class="btn" type="button" disabled>בקרוב</button>
        </article>
      </div>
    </section>
  </main>

  <script>
    (function initHomeTheme() {
      const key = 'micro-study-theme';
      const btn = document.getElementById('theme-toggle');

      function applyTheme(theme) {
        document.body.setAttribute('data-theme', theme);
        localStorage.setItem(key, theme);
        if (btn) {
          btn.textContent = theme === 'dark' ? '☀️ מצב בהיר' : '🌙 מצב כהה';
        }
      }

      const saved = localStorage.getItem(key);
      if (saved === 'dark' || saved === 'light') {
        applyTheme(saved);
      } else {
        const prefersDark = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches;
        applyTheme(prefersDark ? 'dark' : 'light');
      }

      btn?.addEventListener('click', function () {
        const current = document.body.getAttribute('data-theme') === 'dark' ? 'dark' : 'light';
        applyTheme(current === 'dark' ? 'light' : 'dark');
      });
    })();
  </script>
</body>
</html>
